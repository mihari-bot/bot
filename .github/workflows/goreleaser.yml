name: goreleaser

on:
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        description: Build mode
        required: true
        default: snapshot
        options:
          - snapshot
          - release
      tag:
        type: string
        description: Release tag (e.g. v1.2.3). Required when mode=release
        required: false

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure tag (release mode)
        if: ${{ inputs.mode == 'release' }}
        run: |
          set -euo pipefail

          tag="${{ inputs.tag }}"
          if [ -z "${tag}" ]; then
            echo "inputs.tag is required when mode=release" >&2
            exit 1
          fi

          git fetch --tags

          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists"
            exit 0
          fi

          git tag -a "${tag}" -m "${tag}"
          git push origin "${tag}"

      - name: GoReleaser (snapshot)
        if: ${{ inputs.mode == 'snapshot' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: GoReleaser (release)
        if: ${{ inputs.mode == 'release' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
